name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent deployment per target, without cancelling in-progress runs
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── Build for GitHub Pages ─────────────────────────────────────────────────
  build-github-pages:
    name: Build for GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (base = /e-commerce-react/)
        run: npm run build
        env:
          VITE_BASE: /e-commerce-react/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ─── Deploy to GitHub Pages ──────────────────────────────────────────────────
  deploy-github-pages:
    name: Deploy to GitHub Pages
    needs: build-github-pages
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─── Build & Deploy to Cloudflare Pages ─────────────────────────────────────
  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (base = /)
        run: npm run build
        env:
          VITE_BASE: /

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: e-commerce-react
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
